name: Deploy Pigeon Maze (HTML5) to GitHub Pages

# Static deploy: the game in web/ is plain HTML + JS + PNGs, so there is no
# build step — we just publish the folder. Runs for the web-canvas branch (and
# main, once merged) and on manual dispatch.
on:
  push:
    branches: [web-canvas, main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
